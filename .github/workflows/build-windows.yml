name: Build Windows

# Produces the double-clickable Windows build on a Windows runner (electron-builder
# can't build a Windows target from Linux without wine).
#
#  - Manual run (Actions tab -> Run workflow): a DEV build. Uploads the exes as a
#    run artifact only — no release, and the version stays package.json's 0.0.0.
#  - Push a v* tag (e.g. v0.1.0): a RELEASE build. The version comes FROM THE TAG
#    (0.1.0), and the exes are attached to a GitHub Release. package.json is never
#    bumped for dev.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run make-icon

      - name: Typecheck
        run: npm run typecheck

      - name: Bundle (main + preload + renderer)
        run: npm run build

      # Dev (manual) builds keep package.json's version (0.0.0). Tag builds take
      # the version from the tag (v0.1.0 -> 0.1.0) without committing a bump.
      - name: Package Windows installer + portable exe
        shell: bash
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            npx electron-builder --win --config electron-builder.yml --publish never \
              -c.extraMetadata.version="${GITHUB_REF_NAME#v}"
          else
            npx electron-builder --win --config electron-builder.yml --publish never
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
          if-no-files-found: error

      # latest.yml + the .blockmap must be on the release for the in-app updater
      # (electron-updater) to see the new version and download it.
      - name: Publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
          generate_release_notes: true
