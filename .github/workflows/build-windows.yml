name: Build Windows

# Produces the double-clickable Windows build on a Windows runner (electron-builder
# can't build a Windows target from Linux without wine). Run it manually from the
# Actions tab (Run workflow), or push a v* tag to also publish a GitHub Release.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: npm run make-icon

      - name: Typecheck
        run: npm run typecheck

      - name: Bundle (main + preload + renderer)
        run: npm run build

      - name: Package Windows installer + portable exe
        run: npx electron-builder --win --config electron-builder.yml --publish never

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
          if-no-files-found: error

      - name: Publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe
          generate_release_notes: true
