name: Fetch gem data

# One-click gem-data refresh (Actions tab -> "Fetch gem data" -> Run workflow).
# Runs `npm run fetch-gems` against the poewiki Cargo export on a normal-egress
# runner (the dev sandbox can't reach poewiki), verifies the merged gems.json
# still passes the test suite, and commits it straight to main — so nobody has
# to run Node locally to keep gem sources current.
on:
  workflow_dispatch:
    inputs:
      include_uncurated:
        description: Also add gems not yet curated in gems.json (--all)
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # --ignore-scripts skips the Electron binary postinstall — not needed for
      # a Node-only fetch + tests, and it makes the run much faster.
      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Fetch gem sources from the wiki
        run: |
          if [[ "${{ inputs.include_uncurated }}" == "true" ]]; then
            npm run fetch-gems -- --all
          else
            npm run fetch-gems
          fi

      # Guard: the merged gems.json must still satisfy the test suite before it
      # may land on main.
      - name: Verify
        run: npm test

      - name: Commit updated gem data
        run: |
          if git diff --quiet data/gems.json; then
            echo "gems.json unchanged — nothing to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gems.json
          git commit -m "Update gem sources from poewiki (Fetch gem data workflow)"
          git push
          echo "Committed updated data/gems.json to main."
